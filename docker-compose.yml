services:
  admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: veille-admin
    restart: unless-stopped
    env_file: .env
    environment:
      - BETTER_AUTH_URL=http://admin:3001
      - NEXT_PUBLIC_BETTER_AUTH_URL=http://admin:3001
    # Pas de "ports:" — le port n'est PAS exposé publiquement
    # Twingate accède via le réseau interne Docker (http://admin:3001)
    networks:
      - internal

  twingate:
    image: twingate/connector:latest
    container_name: twingate-connector
    restart: unless-stopped
    environment:
      - TWINGATE_NETWORK=${TWINGATE_NETWORK}       # ex: mycompany.twingate.com
      - TWINGATE_ACCESS_TOKEN=${TWINGATE_ACCESS_TOKEN}
      - TWINGATE_REFRESH_TOKEN=${TWINGATE_REFRESH_TOKEN}
    sysctls:
      - net.ipv4.ping_group_range=0 2147483647
    networks:
      - internal

networks:
  internal:
    driver: bridge
