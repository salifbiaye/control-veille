services:
  admin:
    image: ${DOCKER_IMAGE:-gdxebec/veille-admin:latest}
    container_name: veille-admin
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - NEXT_PUBLIC_BETTER_AUTH_URL=${NEXT_PUBLIC_BETTER_AUTH_URL}
      - PAYMENT_PROVIDER=${PAYMENT_PROVIDER:-stripe}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - PADDLE_API_KEY=${PADDLE_API_KEY}
      - PADDLE_ENVIRONMENT=${PADDLE_ENVIRONMENT:-sandbox}
    # Aucun port exposé — accès uniquement via Twingate
    networks:
      - internal

  twingate:
    image: twingate/connector:latest
    container_name: twingate-connector
    restart: unless-stopped
    environment:
      - TWINGATE_NETWORK=${TWINGATE_NETWORK}
      - TWINGATE_ACCESS_TOKEN=${TWINGATE_ACCESS_TOKEN}
      - TWINGATE_REFRESH_TOKEN=${TWINGATE_REFRESH_TOKEN}
    sysctls:
      - net.ipv4.ping_group_range=0 2147483647
    networks:
      - internal

networks:
  internal:
    driver: bridge
